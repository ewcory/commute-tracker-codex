name: Check Commute Alerts

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call alert checker endpoint
        run: |
          curl -fsS "${{ secrets.APP_BASE_URL }}/api/cron/check-alerts" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
